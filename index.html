<!DOCTYPE html>
<html lang="en">
<head>

  <title>Rooted Parenting</title>
  <link rel="stylesheet" href="styles.css" />

<body>
  <div class="app-shell">

    <nav class="tabbar" aria-label="Primary">
      <button class="tabbar__item" data-route="home" type="button">Home</button>

      <button class="tabbar__item" data-route="learning" type="button">Learn</button>
